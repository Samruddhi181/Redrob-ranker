ai_usage_summary: |
  Used Claude (Anthropic) throughout development for architecture design,
  code review, debugging, and drafting submission documentation. No
  candidate data was sent to any external LLM API at ranking time — the
  ranker and reasoning generator are rule-based, run entirely locally with
  no network calls, satisfying the no-hosted-LLM-calls constraint.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Our approach is a hybrid of information retrieval and rule-based scoring.
  We first extract structured facts from the job description and candidate
  profiles, then score each candidate across seven dimensions. The scoring
  is deterministic, reproducible, and does not rely on any external LLMs at
  ranking time. We also generate reasoning strings for each candidate based
  on their own extracted facts, providing transparency into the scoring
  process.
  We score every candidate in the 100K pool (no early filtering) across seven
  dimensions, TF-IDF cosine similarity against the JD (10%), career evidence
  (25%) — distinguishing candidates who built ranking/retrieval/search systems
  from those merely familiar with them, production experience (19%), behavioral
  fit (18%) based on activity, recruiter response rate, and interview completion,
  experience alignment to the 5-9 year band (9%), logistics fit (9%), and
  recruiter demand from platform signals (10%). Profiles with internal
  inconsistencies (inflated titles, impossible skill durations) get a
  multiplicative honeypot discount rather than hard rejection. Reasoning
  strings are template-generated from each candidate's own extracted facts —
  no LLM calls at ranking time.

