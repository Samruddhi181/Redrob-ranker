ai_usage_summary: |
  Used Claude (Anthropic) throughout development for architecture design,
  code review, debugging, and drafting submission documentation. No
  candidate data was sent to any external LLM API at ranking time — the
  ranker and reasoning generator are rule-based, run entirely locally with
  no network calls, satisfying the no-hosted-LLM-calls constraint.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with explicit, auditable reasoning. Every candidate in
  the 100K pool is scored (no early filtering) on six weighted components:
  technical/domain fit (JD keyword evidence, 25%), career evidence fit
  (proof of having actually built ranking/retrieval/search systems, 20%),
  production experience fit (deployment/scale signals in role descriptions,
  20%), behavioral fit (Redrob engagement signals — response rate, interview
  completion, recency, 15%), experience alignment to the JD's 5-9 year band
  (10%), and logistics fit (work mode, relocation, notice period, 10%). A
  separate honeypot-risk detector flags internally inconsistent profiles
  (experience vs. career-history length, title seniority vs. years, skill
  duration vs. total experience) and multiplicatively discounts their score
  rather than hard-filtering them. Reasoning strings are template-generated
  from each candidate's own scored facts (no LLM call), keeping output fast,
  deterministic, and hallucination-free. Runtime is ~7 seconds for 100K
  candidates on CPU.

