reproduce_command: "python -m src.make_submission data/job_description.docx data/candidates.jsonl outputs/submission.csv"
# Verified: runs end-to-end in ~40 seconds, ~14MB peak RAM, no network calls,
# deterministic output (reran and diffed byte-identical). Runtime roughly
# doubled from the earlier ~14s after switching capability_match to
# TF-IDF: scoring now requires two streaming passes over the 100K-candidate
# file instead of one -- one pass to learn corpus-wide IDF weights, one to
# score everyone -- so neither pass holds more than one candidate (plus the
# IDF vocabulary) in memory, which is why peak RAM is unchanged. Runtime
# rose again (~28s -> ~37s) after adding the builder-phrase regex scan to
# career_evidence_fit (still one pass, just more regex work per candidate),
# and again to ~40s after rebuilding behavioral_fit. Adding the
# recruiter_demand dimension didn't move runtime further -- it's just three
# O(1) dict lookups and a divide per candidate, no new regex or extra pass.

