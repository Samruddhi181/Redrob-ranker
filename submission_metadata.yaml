ai_usage_summary: |
  Used Claude (Anthropic) throughout development for architecture design,
  code review, debugging, and drafting submission documentation. No
  candidate data was sent to any external LLM API at ranking time — the
  ranker and reasoning generator are rule-based, run entirely locally with
  no network calls, satisfying the no-hosted-LLM-calls constraint.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with explicit, auditable reasoning. Every candidate in
  the 100K pool is scored (no early filtering) on seven weighted components:
  capability match (TF-IDF cosine similarity between the candidate's
  profile text and the JD's full text, with IDF weights learned from the
  100K-candidate pool itself, 18%), career evidence fit
  (proof of having actually built ranking/retrieval/search systems, weighted
  by how rare/distinctive each matched signal term is in the candidate pool
  rather than counting every exact match the same -- plus a steep bonus
  when a builder verb and a JD-relevant noun appear together a few words
  apart in the candidate's own career history, summary, or headline, e.g.
  "Built candidate recommendation engine", since that's a far rarer and
  more specific claim than either a builder verb or a domain term alone,
  18%), production
  experience fit (deployment/scale signals in role descriptions, same
  IDF-weighted matching, 18%), behavioral fit (18%, raised from an earlier
  15% and rebuilt as three equal parts -- activity, response, reliability --
  directly off the JD's own closing instruction that a candidate inactive
  for 6 months with a 5% recruiter response rate is "not actually
  available" and should be down-weighted; activity decays recency of
  last_active_date to zero at that same 6-month mark, anchored to the most
  recent last_active_date seen anywhere in the 100K-candidate pool rather
  than wall-clock time so the score stays fully reproducible regardless of
  when the script is re-run), experience alignment
  to the JD's 5-9 year band (9%), logistics fit (work mode, relocation,
  notice period, 9%), and recruiter demand (saved_by_recruiters_30d,
  profile_views_received_30d, search_appearance_30d -- signals *other*
  recruiters already generated about this candidate, which none of the
  other six dimensions can see; equal-weighted average of the three, each
  normalized against its own field's 95th-percentile value across the
  100K-candidate pool rather than its raw max, since these are unbounded
  right-skewed counts where a couple of extreme outliers would otherwise
  compress everyone else toward 0, 10%). The other six dimensions each gave
  up their share of that 10% proportionally (20/20/20/20/10/10 ->
  18/18/18/18/9/9) when recruiter demand was added. A
  separate honeypot-risk detector flags internally inconsistent profiles
  (experience vs. career-history length, title seniority vs. years, skill
  duration vs. total experience, high recruiter saves paired with a near-zero
  response rate) and multiplicatively discounts their score
  rather than hard-filtering them. Reasoning strings are template-generated
  from each candidate's own scored facts (no LLM call): each one leads with
  whatever dimension that candidate actually scores strongest on, names the
  specific evidence behind it, and honestly surfaces the candidate's own
  weakest dimension or honeypot concern when one is present — never a
  fabricated weakness, and never the same templated shape twice. Runtime is
  ~40 seconds for 100K candidates on CPU.

